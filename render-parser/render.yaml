services:
  - type: web
    name: randall-programme-parser
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /
    envVars:
      - key: PARSER_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: MAX_PAGES
        value: "12"
      - key: PDF_DPI
        value: "200"
